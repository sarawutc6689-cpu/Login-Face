<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    body { font-family: Arial; background:#f5f6fa; padding:12px; }
    .card {
      background:white; border-radius:16px; padding:16px;
      max-width:480px; margin:auto;
      box-shadow:0 10px 25px rgba(0,0,0,0.1);
    }
    input { width:95%; padding:12px; margin-bottom:10px; font-size:16px; }
    #map { height:220px; border-radius:12px; margin:10px 0; }
    video { width:100%; border-radius:12px; }
    .btn-group { display:flex; gap:10px; margin-top:10px; }
    button { flex:1; padding:12px; font-size:16px; color:white; border:none; border-radius:10px; }
    .btn-in { background:#273c75; }
    .btn-out { background:#c23616; }
    #status { text-align:center; margin-top:10px; font-weight:bold; }
  </style>
</head>

<body>
<div class="card">
  <h2>📸 ระบบลงเวลา</h2>

  <input type="text" id="employee_id" placeholder="รหัสพนักงาน" onkeyup="lookupEmployee()">
  <div id="empName"></div>

  <div id="map"></div>

  <video id="video" autoplay playsinline></video>
  <canvas id="canvas" style="display:none;"></canvas>

  <div class="btn-group">
    <button class="btn-in" onclick="capture('IN')">🟢 เข้างาน</button>
    <button class="btn-out" onclick="capture('OUT')">🔴 ออกงาน</button>
  </div>

  <div id="status"></div>
</div>

<script>
const OFFICE_LAT = 14.57736759075333;
const OFFICE_LNG = 100.79379214129247;
const ALLOW_RADIUS = 100;

let map, videoStream;
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const statusDiv = document.getElementById("status");

function lookupEmployee() {
  const empId = document.getElementById("employee_id").value.trim();
  const empNameDiv = document.getElementById("empName");

  if (!empId) { empNameDiv.innerText = ""; return; }

  google.script.run.withSuccessHandler(res => {
    if (res.result === "success") {
      empNameDiv.innerText = "👤 " + res.name;
      empNameDiv.style.color = "green";
    } else {
      empNameDiv.innerText = "❌ " + res.message;
      empNameDiv.style.color = "red";
    }
  }).getEmployee(empId);
}

function initMap() {
  map = L.map('map').setView([OFFICE_LAT, OFFICE_LNG], 15);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
  L.marker([OFFICE_LAT, OFFICE_LNG]).addTo(map).bindPopup("🏢 บริษัท");
  L.circle([OFFICE_LAT, OFFICE_LNG], { radius: ALLOW_RADIUS, color:'red' }).addTo(map);
}

function initCamera() {
  navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
    .then(stream => video.srcObject = stream)
    .catch(() => alert("เปิดกล้องไม่ได้"));
}

function getDistance(lat1,lng1,lat2,lng2){
  const R=6371e3;
  const p1=lat1*Math.PI/180, p2=lat2*Math.PI/180;
  const dp=(lat2-lat1)*Math.PI/180;
  const dl=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dp/2)**2 + Math.cos(p1)*Math.cos(p2)*Math.sin(dl/2)**2;
  return R*(2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)));
}

function capture(type) {
  const empId = document.getElementById("employee_id").value.trim();
  const empName = document.getElementById("empName").innerText.replace("👤 ","");

  if (!empId || !empName) {
    alert("กรอกรหัสพนักงานให้ถูกต้อง");
    return;
  }

  statusDiv.innerText = "📡 กำลังหาตำแหน่ง...";

  navigator.geolocation.getCurrentPosition(pos => {

    const lat = pos.coords.latitude;
    const lng = pos.coords.longitude;
    const accuracy = pos.coords.accuracy;
    const speed = pos.coords.speed || 0;

    const distance = getDistance(lat,lng,OFFICE_LAT,OFFICE_LNG);
    if (distance > ALLOW_RADIUS) {
      statusDiv.innerText = "❌ อยู่นอกพื้นที่";
      statusDiv.style.color = "red";
      return;
    }

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    canvas.getContext("2d").drawImage(video,0,0);
    const base64 = canvas.toDataURL("image/jpeg",0.8).split(',')[1];

    statusDiv.innerText = "⏳ กำลังบันทึก...";

    google.script.run.withSuccessHandler(res => {
      statusDiv.innerText = res.message;
      statusDiv.style.color = res.result === "success" ? "green" : "red";
    }).saveAttendance({
      employee_id: empId,
      name: empName,
      status: type,
      latitude: lat,
      longitude: lng,
      accuracy: accuracy,
      speed: speed,
      image: base64
    });

  }, () => {
    statusDiv.innerText = "❌ ระบุตำแหน่งไม่ได้";
    statusDiv.style.color = "red";
  }, { enableHighAccuracy:true });
}

document.addEventListener("DOMContentLoaded", () => {
  initMap();
  initCamera();
});
</script>
</body>
</html>
