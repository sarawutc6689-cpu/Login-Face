<!DOCTYPE html>
<html>
<body>
  <button onclick="testConnection()">ทดสอบการเชื่อมต่อ</button>
  <div id="result"></div>
  
  <script>
  function testConnection() {
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwlQ2AUXauWgI4p8S6zEk3k5ZiGdl0auMKCkqgef5L2pwfgnYlk4hO2fjPI2poeOOD9TQ/exec';
    
    fetch(SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        action: 'saveAttendance',
        employee_id: 'TEST001',
        status: 'TEST',
        latitude: 14.577,
        longitude: 100.793,
        image: ''
      })
    })
    .then(res => res.json())
    .then(data => {
      document.getElementById('result').innerText = 'สำเร็จ: ' + JSON.stringify(data);
    })
    .catch(err => {
      document.getElementById('result').innerText = 'Error: ' + err;
    });
  }
  </script>
</body>
</html>
