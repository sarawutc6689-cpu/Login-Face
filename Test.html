<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบลงเวลาทำงานนอกสถานที่</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Sarabun', 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      max-width: 450px;
      width: 100%;
      background: white;
      border-radius: 24px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 32px 20px;
      text-align: center;
    }

    .header h1 {
      font-size: 1.8rem;
      margin-bottom: 8px;
    }

    .header p {
      opacity: 0.9;
      font-size: 0.95rem;
    }

    .content {
      padding: 24px;
    }

    .input-group {
      margin-bottom: 20px;
    }

    .input-group label {
      display: block;
      margin-bottom: 8px;
      color: #2d3748;
      font-weight: 600;
      font-size: 0.95rem;
    }

    .input-group input {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      font-size: 16px;
      transition: all 0.2s;
    }

    .input-group input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .btn-location {
      width: 100%;
      padding: 14px;
      background: #ed8936;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.2s;
    }

    .btn-location:hover {
      background: #dd6b20;
      transform: translateY(-2px);
    }

    .location-box {
      background: #f7fafc;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      border-left: 4px solid #4299e1;
      display: none;
    }

    .location-box div {
      margin: 6px 0;
      display: flex;
      align-items: center;
      gap: 8px;
      color: #2d3748;
      font-size: 0.95rem;
    }

    .camera-box {
      width: 100%;
      min-height: 300px;
      background: #1a202c;
      border-radius: 12px;
      margin: 16px 0;
      position: relative;
      overflow: hidden;
    }

    #video {
      width: 100%;
      height: auto;
      display: none;
    }

    .camera-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.7);
      color: white;
    }

    .camera-overlay span {
      font-size: 48px;
      margin-bottom: 12px;
    }

    .btn-camera {
      background: #48bb78;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 30px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 12px;
      transition: all 0.2s;
    }

    .btn-camera:hover {
      background: #38a169;
      transform: scale(1.05);
    }

    .button-group {
      display: flex;
      gap: 12px;
      margin: 16px 0;
    }

    .btn-in, .btn-out {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-in {
      background: #4299e1;
      color: white;
    }

    .btn-out {
      background: #f56565;
      color: white;
    }

    .btn-in:hover:not(:disabled), .btn-out:hover:not(:disabled) {
      transform: translateY(-2px);
    }

    .btn-in:disabled, .btn-out:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #status {
      padding: 12px;
      border-radius: 10px;
      text-align: center;
      font-weight: 600;
      margin-top: 16px;
    }

    .status-success {
      background: #c6f6d5;
      color: #22543d;
    }

    .status-error {
      background: #fed7d7;
      color: #742a2a;
    }

    .status-warning {
      background: #feebc8;
      color: #7b341e;
    }

    .footer {
      text-align: center;
      padding: 20px;
      background: #f7fafc;
      border-top: 1px solid #e2e8f0;
      color: #718096;
      font-size: 0.85rem;
    }

    #employeeName {
      margin-top: 8px;
      padding: 8px;
      border-radius: 8px;
      background: #f7fafc;
      font-size: 0.95rem;
    }

    canvas {
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📸 ระบบลงเวลาทำงาน</h1>
      <p>สำหรับพนักงานนอกสถานที่</p>
    </div>

    <div class="content">
      <!-- แจ้งเตือน Github Pages -->
      <div style="background: #4299e1; color: white; padding: 10px; border-radius: 10px; margin-bottom: 16px; text-align: center;">
        🌐 ระบบลงเวลาทำงาน (Github Pages)
      </div>

      <!-- รหัสพนักงาน -->
      <div class="input-group">
        <label>👤 รหัสพนักงาน</label>
        <input type="text" id="employeeId" placeholder="เช่น EMP001" autocomplete="off">
        <div id="employeeName"></div>
      </div>

      <!-- ปุ่มค้นหาตำแหน่ง -->
      <button class="btn-location" onclick="getLocation()">
        <span>📍</span> ค้นหาตำแหน่งปัจจุบัน
      </button>

      <!-- ข้อมูลตำแหน่ง -->
      <div id="locationBox" class="location-box">
        <div><span>📍</span> <span id="address">-</span></div>
        <div><span>🎯</span> ความแม่นยำ: <span id="accuracy">0</span> เมตร</div>
        <div><span>🏢</span> ระยะห่าง: <span id="distance">0</span> เมตร</div>
        <div><span>📅</span> <span id="currentTime"></span></div>
      </div>

      <!-- กล้อง -->
      <div class="camera-box">
        <video id="video" autoplay playsinline></video>
        <div id="cameraOverlay" class="camera-overlay">
          <span>📷</span>
          <div id="cameraMessage">กดปุ่มเพื่อเปิดกล้อง</div>
          <button class="btn-camera" onclick="initCamera()">เปิดกล้อง</button>
        </div>
      </div>

      <canvas id="canvas"></canvas>

      <!-- ปุ่มเข้างาน/ออกงาน -->
      <div class="button-group">
        <button class="btn-in" onclick="capture('IN')" id="btnIn" disabled>🟢 เข้างาน</button>
        <button class="btn-out" onclick="capture('OUT')" id="btnOut" disabled>🔴 ออกงาน</button>
      </div>

      <!-- สถานะ -->
      <div id="status"></div>
    </div>

    <div class="footer">
      <p>© 2026 ระบบลงเวลาทำงานนอกสถานที่</p>
      <p>พัฒนาโดย IT Support</p>
    </div>
  </div>

  <script>
    // ค่าคงที่
    const OFFICE_LAT = 14.57736759075333;
    const OFFICE_LNG = 100.79379214129247;
    const ALLOW_RADIUS = 100;
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwp-Z98V_bMxBz_mK6inPwCzwswM6oKFK8uOIp0DGWejCsdVPuxb24R7Zx9N6so8ldpkQ/exec';

    // ตัวแปร
    let cameraStream = null;
    let isCameraReady = false;
    let currentPosition = null;

    // ดึง elements
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const statusDiv = document.getElementById('status');
    const btnIn = document.getElementById('btnIn');
    const btnOut = document.getElementById('btnOut');
    const cameraOverlay = document.getElementById('cameraOverlay');
    const cameraMessage = document.getElementById('cameraMessage');
    const locationBox = document.getElementById('locationBox');
    const addressSpan = document.getElementById('address');
    const accuracySpan = document.getElementById('accuracy');
    const distanceSpan = document.getElementById('distance');
    const currentTimeSpan = document.getElementById('currentTime');
    const employeeId = document.getElementById('employeeId');
    const employeeName = document.getElementById('employeeName');

    // อัปเดตเวลา
    function updateTime() {
      const now = new Date();
      const options = { 
        year: 'numeric', 
        month: 'long', 
        day: 'numeric',
        hour: '2-digit', 
        minute: '2-digit',
        second: '2-digit'
      };
      if (currentTimeSpan) {
        currentTimeSpan.innerText = now.toLocaleDateString('th-TH', options);
      }
    }
    setInterval(updateTime, 1000);
    updateTime();

    // เปิดกล้อง
    window.initCamera = function() {
      cameraOverlay.style.display = 'flex';
      video.style.display = 'none';
      cameraMessage.innerText = 'กำลังขอสิทธิ์ใช้งานกล้อง...';
      
      btnIn.disabled = true;
      btnOut.disabled = true;
      
      if (cameraStream) {
        cameraStream.getTracks().forEach(track => track.stop());
        cameraStream = null;
      }
      
      navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } })
      .then(function(stream) {
        cameraStream = stream;
        video.srcObject = stream;
        
        video.onloadedmetadata = function() {
          cameraOverlay.style.display = 'none';
          video.style.display = 'block';
          btnIn.disabled = false;
          btnOut.disabled = false;
          isCameraReady = true;
          showStatus('✅ กล้องพร้อมใช้งาน', 'success');
        };
      })
      .catch(function(err) {
        cameraMessage.innerText = '❌ ไม่สามารถเปิดกล้องได้';
        showStatus('❌ ไม่สามารถเปิดกล้องได้', 'error');
      });
    };

    // ค้นหาตำแหน่ง
    window.getLocation = function() {
      showStatus('📍 กำลังค้นหาตำแหน่ง...', 'warning');
      
      navigator.geolocation.getCurrentPosition(
        function(pos) {
          currentPosition = {
            lat: pos.coords.latitude,
            lng: pos.coords.longitude,
            accuracy: pos.coords.accuracy
          };
          
          const distance = calculateDistance(
            currentPosition.lat, 
            currentPosition.lng, 
            OFFICE_LAT, 
            OFFICE_LNG
          );
          
          accuracySpan.innerText = currentPosition.accuracy.toFixed(0);
          distanceSpan.innerText = distance.toFixed(0);
          
          getAddress(currentPosition.lat, currentPosition.lng);
          locationBox.style.display = 'block';
          
          if (distance <= ALLOW_RADIUS) {
            showStatus(`✅ อยู่ในพื้นที่ (ห่าง ${distance.toFixed(0)} เมตร)`, 'success');
          } else {
            showStatus(`⚠️ อยู่นอกพื้นที่ (ห่าง ${distance.toFixed(0)} เมตร)`, 'warning');
          }
        },
        function(err) {
          let msg = '❌ ไม่สามารถระบุตำแหน่ง';
          if (err.code === 1) msg = '❌ ไม่อนุญาตให้เข้าถึงตำแหน่ง';
          showStatus(msg, 'error');
        },
        { enableHighAccuracy: true, timeout: 10000 }
      );
    };

    // ดึงที่อยู่
    function getAddress(lat, lng) {
      const url = `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`;
      
      fetch(url, { headers: { 'User-Agent': 'AttendanceApp' } })
      .then(res => res.json())
      .then(data => {
        if (data.display_name) {
          let addr = data.display_name;
          if (addr.length > 50) addr = addr.substr(0, 50) + '...';
          addressSpan.innerText = addr;
        }
      })
      .catch(() => {
        addressSpan.innerText = `${lat.toFixed(6)}, ${lng.toFixed(6)}`;
      });
    }

    // คำนวณระยะทาง
    function calculateDistance(lat1, lon1, lat2, lon2) {
      const R = 6371e3;
      const φ1 = lat1 * Math.PI/180;
      const φ2 = lat2 * Math.PI/180;
      const Δφ = (lat2-lat1) * Math.PI/180;
      const Δλ = (lon2-lon1) * Math.PI/180;
      
      const a = Math.sin(Δφ/2) ** 2 +
                Math.cos(φ1) * Math.cos(φ2) *
                Math.sin(Δλ/2) ** 2;
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
      return R * c;
    }

    // ฟังก์ชันสำหรับ JSONP
    function jsonp(url, callbackName, callback) {
      // สร้าง callback function ชั่วคราว
      window[callbackName] = function(data) {
        callback(data);
        // ลบ script และ callback หลังจากใช้งาน
        setTimeout(() => {
          delete window[callbackName];
          const script = document.querySelector(`script[src*="${callbackName}"]`);
          if (script) script.remove();
        }, 100);
      };
      
      // สร้าง script tag
      const script = document.createElement('script');
      script.src = url + '&callback=' + callbackName;
      document.head.appendChild(script);
    }

    // ค้นหาพนักงาน (ใช้ JSONP)
    employeeId.addEventListener('input', function() {
      const id = this.value.trim();
      
      if (id.length >= 3) {
        employeeName.innerText = '🔍 กำลังค้นหา...';
        
        const callbackName = 'cb_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5);
        const url = `${SCRIPT_URL}?action=getEmployee&employee_id=${id}`;
        
        jsonp(url, callbackName, function(data) {
          if (data && data.result === 'success') {
            employeeName.innerText = `👤 ${data.name} (${data.department})`;
            employeeName.style.color = '#2d3748';
          } else {
            employeeName.innerText = '❌ ไม่พบพนักงาน';
            employeeName.style.color = '#e53e3e';
          }
        });
      } else {
        employeeName.innerText = '';
      }
    });

    // ถ่ายภาพและบันทึก (ใช้ JSONP)
    window.capture = function(status) {
      const empId = employeeId.value.trim();
      
      if (!empId) {
        showStatus('❌ กรุณากรอกรหัสพนักงาน', 'error');
        return;
      }
      
      if (!isCameraReady) {
        showStatus('❌ กรุณาเปิดกล้องก่อน', 'error');
        return;
      }
      
      if (!currentPosition) {
        showStatus('❌ กรุณาค้นหาตำแหน่งก่อน', 'error');
        return;
      }
      
      showStatus('📷 กำลังถ่ายภาพ...', 'warning');
      
      // ถ่ายภาพ
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      canvas.getContext('2d').drawImage(video, 0, 0);
      
      // แปลงเป็น Base64
      const imageData = canvas.toDataURL('image/jpeg', 0.7);
      const base64Data = encodeURIComponent(imageData);
      
      showStatus('⏳ กำลังบันทึก...', 'warning');
      
      // ส่งข้อมูลแบบ JSONP
      const callbackName = 'save_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5);
      const url = `${SCRIPT_URL}?action=saveAttendance&employee_id=${empId}&status=${status}&lat=${currentPosition.lat}&lng=${currentPosition.lng}&image=${base64Data}`;
      
      jsonp(url, callbackName, function(data) {
        if (data && data.result === 'success') {
          showStatus('✅ บันทึกสำเร็จ', 'success');
          employeeId.value = '';
          employeeName.innerText = '';
          currentPosition = null;
          locationBox.style.display = 'none';
        } else {
          showStatus('❌ ' + (data ? data.message : 'บันทึกไม่สำเร็จ'), 'error');
        }
      });
    };

    // แสดงสถานะ
    function showStatus(message, type) {
      statusDiv.innerText = message;
      statusDiv.className = '';
      if (type === 'success') statusDiv.classList.add('status-success');
      if (type === 'error') statusDiv.classList.add('status-error');
      if (type === 'warning') statusDiv.classList.add('status-warning');
    }

    // ตรวจสอบ In-App Browser
    if (navigator.userAgent.includes('Line') || 
        navigator.userAgent.includes('FBAN')) {
      const warning = document.createElement('div');
      warning.style.background = '#ed8936';
      warning.style.color = 'white';
      warning.style.padding = '10px';
      warning.style.borderRadius = '8px';
      warning.style.marginBottom = '15px';
      warning.style.textAlign = 'center';
      warning.innerHTML = '⚠️ กรุณากด ⋮ แล้วเลือก "เปิดในเบราว์เซอร์"';
      document.querySelector('.content').prepend(warning);
    }
  </script>
</body>
</html>
