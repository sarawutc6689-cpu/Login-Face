<!DOCTYPE html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบลงเวลาพนักงาน</title>
</head>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ระบบลงเวลา</title>

  <style>
    body {
      font-family: Arial;
      background: #f5f6fa;
      padding: 15px;
    }

    .card {
      background: white;
      border-radius: 18px;
      padding: 18px;
      max-width: 480px;
      margin: auto;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    h2 { text-align:center; }

    input, select {
      width: 95%;
      padding: 12px;
      margin-bottom: 10px;
      font-size: 16px;
      border-radius: 10px;
      border: 1px solid #ddd;
    }

    video {
      width: 100%;
      border-radius: 12px;
      margin: 10px 0;
      background: black;
    }

    button {
      width: 48%;
      padding: 12px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      color: white;
      cursor: pointer;
    }

    .btn-in { background: #273c75; }
    .btn-out { background: #c23616; }

    .btn-group {
      display: flex;
      justify-content: space-between;
      margin-top: 10px;
    }

    #status {
      text-align: center;
      margin-top: 12px;
      font-weight: bold;
    }

       footer {
      text-align: center;
      padding: 30px;
      color: var(--gray-color);
      font-size: 0.9rem;
      border-top: 1px solid #eee;
      background-color: rgba(248, 249, 250, 0.8);
    }
    
    footer p {
      margin-bottom: 8px;
    }
    
    .footer-links {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 15px;
    }
    
    .footer-links a {
      color: var(--primary-color);
      text-decoration: none;
      font-weight: 500;
      transition: var(--transition);
    }
    
    .footer-links a:hover {
      color: var(--secondary-color);
      text-decoration: underline;
    }
  </style>
  
</head>

<body>
  <div class="card">
    <h2>📸 ระบบลงเวลา</h2>

    <input id="empId" placeholder="รหัสพนักงาน">
    <input id="empName" placeholder="ชื่อพนักงาน">

    <select id="cameraSelect">
      <option value="user">📸 กล้องหน้า</option>
      <option value="environment">📸 กล้องหลัง</option>
    </select>

    <video id="video" autoplay playsinline></video>
    <canvas id="canvas" style="display:none;"></canvas>

    <div class="btn-group">
      <button class="btn-in" onclick="capture('IN')">🟢 เข้างาน</button>
      <button class="btn-out" onclick="capture('OUT')">🔴 ออกงาน</button>
    </div>

    <div id="status"></div>
  </div>

    <footer>
      <p>ลงเวลานอกสถานที่  © 2026 | พัฒนาโดย Sarawut.C</p>
      <p>สำหรับใช้ภายในองค์กรเท่านั้น</p>
    </footer>

  <script src="https://unpkg.com/face-api.js@0.22.2/dist/face-api.min.js"></script>
  
  <script>

const YOUR_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbxCC-kieyXgoSGYKxnhJY2bgsrbvbxfM3KB1SPPSCf9jLeOGL7lurHwKAAzy-iv3iZrCA/exec";

const OFFICE_LAT = 14.57736759075333;
const OFFICE_LNG = 100.79379214129247;
const ALLOW_RADIUS = 100;

let stream;
let blinkDetected = false;

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const statusDiv = document.getElementById("status");

/* ===== CAMERA ===== */

async function initCamera() {
  if (stream) stream.getTracks().forEach(track => track.stop());

  const facingMode = document.getElementById("cameraSelect").value;

  stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode }
  });

  video.srcObject = stream;
}

document.getElementById("cameraSelect")
  .addEventListener("change", initCamera);

/* ===== LOAD MODELS ===== */

async function loadModels() {
  await faceapi.nets.tinyFaceDetector.loadFromUri('/models');
  await faceapi.nets.faceLandmark68Net.loadFromUri('/models');
  console.log("Models Loaded");
}

/* ===== BLINK DETECTION ===== */

async function detectBlink() {

  const detection = await faceapi
    .detectSingleFace(video, new faceapi.TinyFaceDetectorOptions())
    .withFaceLandmarks();

  if (!detection) return;

  const leftEye = detection.landmarks.getLeftEye();
  const rightEye = detection.landmarks.getRightEye();

  function distance(a, b) {
    return Math.hypot(a.x - b.x, a.y - b.y);
  }

  function ear(eye) {
    const A = distance(eye[1], eye[5]);
    const B = distance(eye[2], eye[4]);
    const C = distance(eye[0], eye[3]);
    return (A + B) / (2.0 * C);
  }

  const eyeRatio = (ear(leftEye) + ear(rightEye)) / 2;

  if (eyeRatio < 0.20) {
    blinkDetected = true;
    statusDiv.innerText = "✅ ตรวจพบการกระพริบตา";
    statusDiv.style.color = "green";
  }
}

/* ===== CAPTURE ===== */

function capture(type) {

  if (!blinkDetected) {
    alert("กรุณากระพริบตาก่อนถ่ายภาพ");
    return;
  }

  alert("ถ่ายภาพได้ (ผ่าน liveness)");
}

/* ===== START ===== */

window.addEventListener("load", async () => {

  while (typeof faceapi === "undefined") {
    await new Promise(r => setTimeout(r, 100));
  }

  await loadModels();
  await initCamera();

  setInterval(detectBlink, 500);
});

</script>

</body>
</html>
