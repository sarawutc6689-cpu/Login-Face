<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>รายงานการลงเวลา</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <style>
    body { font-family: Arial; background:#f5f6fa; padding:15px; }
    .card { background:#fff; padding:16px; border-radius:14px; box-shadow:0 8px 20px rgba(0,0,0,.08); }
    h2 { text-align:center; margin-top:0; }
    .filters { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:12px; }
    .filters input, .filters select, .filters button {
      padding:8px; border-radius:8px; border:1px solid #ddd;
    }
    table { width:100%; border-collapse:collapse; font-size:14px; }
    th, td { border:1px solid #eee; padding:6px; text-align:center; }
    th { background:#273c75; color:#fff; }
    .btn { padding:6px 8px; border:none; border-radius:6px; cursor:pointer; }
    .btn-map { background:#00a8ff; color:#fff; }
    .btn-img { background:#44bd32; color:#fff; }
    #mapModal {
      display:none; position:fixed; inset:0; background:rgba(0,0,0,.6);
      align-items:center; justify-content:center;
    }
    #mapBox {
      background:#fff; width:95%; max-width:700px; height:420px; border-radius:12px; padding:10px;
    }
    #map { width:100%; height:360px; border-radius:10px; }
    .close { text-align:right; cursor:pointer; color:#c23616; font-weight:bold; }
  </style>
</head>
<body>

<div class="card">
  <h2>📊 รายงานการลงเวลา</h2>

  <div class="filters">
    <input type="date" id="filterDate">
    <input type="text" id="filterEmp" placeholder="รหัสพนักงาน">
    <select id="filterType">
      <option value="">ทั้งหมด</option>
      <option value="IN">IN</option>
      <option value="OUT">OUT</option>
    </select>
    <button onclick="loadData()">ค้นหา</button>
  </div>

  <div style="overflow:auto;">
    <table id="table">
      <thead>
        <tr>
          <th>เวลา</th>
          <th>รหัส</th>
          <th>ชื่อ</th>
          <th>ประเภท</th>
          <th>ระยะ (m)</th>
          <th>รูป</th>
          <th>แผนที่</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<!-- Map Modal -->
<div id="mapModal">
  <div id="mapBox">
    <div class="close" onclick="closeMap()">ปิด</div>
    <div id="map"></div>
  </div>
</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbxCC-kieyXgoSGYKxnhJY2bgsrbvbxfM3KB1SPPSCf9jLeOGL7lurHwKAAzy-iv3iZrCA/exec";

let allData = [];
let map;

async function loadData() {
  const res = await fetch(WEBAPP_URL);
  allData = await res.json();
  renderTable();
}

function renderTable() {
  const tbody = document.querySelector("#table tbody");
  tbody.innerHTML = "";

  const fDate = document.getElementById("filterDate").value;
  const fEmp = document.getElementById("filterEmp").value.trim();
  const fType = document.getElementById("filterType").value;

  allData.forEach(row => {
    const rowDate = new Date(row.time).toISOString().slice(0,10);

    if (fDate && rowDate !== fDate) return;
    if (fEmp && row.employee_id !== fEmp) return;
    if (fType && row.type !== fType) return;

    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${new Date(row.time).toLocaleString("th-TH")}</td>
      <td>${row.employee_id}</td>
      <td>${row.name}</td>
      <td>${row.type}</td>
      <td>${row.distance}</td>
      <td><button class="btn btn-img" onclick="openImage('${row.image}')">ดู</button></td>
      <td><button class="btn btn-map" onclick="openMap(${row.lat}, ${row.lng})">เปิด</button></td>
    `;
    tbody.appendChild(tr);
  });
}

function openImage(url) {
  window.open(url, "_blank");
}

function openMap(lat, lng) {
  document.getElementById("mapModal").style.display = "flex";

  if (!map) {
    map = L.map('map').setView([lat, lng], 17);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap'
    }).addTo(map);
  } else {
    map.setView([lat, lng], 17);
  }

  L.marker([lat, lng]).addTo(map);
}

function closeMap() {
  document.getElementById("mapModal").style.display = "none";
}

loadData();
</script>

</body>
</html>
