<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบลงเวลาทำงานนอกสถานที่</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      font-family: 'Sarabun', 'Segoe UI', Tahoma, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      max-width: 450px;
      width: 100%;
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 30px 20px;
      text-align: center;
    }

    .header h1 {
      font-size: 1.8rem;
      margin-bottom: 5px;
    }

    .header p {
      opacity: 0.9;
      font-size: 0.9rem;
    }

    .content {
      padding: 20px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 5px;
      color: #2d3748;
      font-weight: 600;
      font-size: 0.95rem;
    }

    input {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 16px;
      transition: border-color 0.3s;
    }

    input:focus {
      outline: none;
      border-color: #667eea;
    }

    .camera-container {
      width: 100%;
      min-height: 300px;
      background: #1a202c;
      border-radius: 10px;
      overflow: hidden;
      margin: 15px 0;
      position: relative;
    }

    #video {
      width: 100%;
      height: auto;
      display: block;
    }

    .camera-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.7);
      color: white;
    }

    .camera-overlay.hidden {
      display: none;
    }

    .camera-overlay span {
      font-size: 48px;
      margin-bottom: 10px;
    }

    .btn-camera {
      background: #48bb78;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
    }

    .btn-group {
      display: flex;
      gap: 10px;
      margin: 15px 0;
    }

    button {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, opacity 0.2s;
    }

    button:hover {
      transform: translateY(-2px);
    }

    button:active {
      transform: translateY(0);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .btn-in {
      background: #4299e1;
      color: white;
    }

    .btn-out {
      background: #f56565;
      color: white;
    }

    .btn-location {
      background: #ed8936;
      color: white;
      margin-bottom: 10px;
    }

    .location-info {
      background: #ebf4ff;
      border-radius: 10px;
      padding: 15px;
      margin: 15px 0;
      border-left: 4px solid #4299e1;
    }

    .location-info div {
      margin: 5px 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #status {
      padding: 12px;
      border-radius: 8px;
      text-align: center;
      font-weight: 600;
      margin: 15px 0;
    }

    .status-success {
      background: #c6f6d5;
      color: #22543d;
    }

    .status-error {
      background: #fed7d7;
      color: #742a2a;
    }

    .status-warning {
      background: #feebc8;
      color: #7b341e;
    }

    .footer {
      text-align: center;
      padding: 20px;
      background: #f7fafc;
      border-top: 1px solid #e2e8f0;
      color: #718096;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📸 ระบบลงเวลาทำงาน</h1>
      <p>สำหรับพนักงานนอกสถานที่</p>
    </div>

    <div class="content">
      <!-- แจ้งเตือน Github Pages -->
      <div style="background: #4299e1; color: white; padding: 10px; border-radius: 8px; margin-bottom: 15px; text-align: center; font-size: 0.9rem;">
        🌐 ระบบลงเวลาทำงาน (Github Pages)
      </div>

      <div class="form-group">
        <label>👤 รหัสพนักงาน</label>
        <input type="text" id="employeeId" placeholder="" autocomplete="off">
        <div id="employeeName" style="margin-top: 5px; font-size: 0.9rem; color: #718096;"></div>
      </div>

      <button class="btn-location" onclick="getLocation()" id="locationBtn">
        <span>📍</span> ค้นหาตำแหน่งปัจจุบัน
      </button>

      <div id="locationInfo" class="location-info" style="display: none;">
        <div><span>📍</span> <span id="address">กำลังค้นหา...</span></div>
        <div><span>🎯</span> ความแม่นยำ: <span id="accuracy">0</span> เมตร</div>
        <div><span>🏢</span> ระยะห่างจากบริษัท: <span id="distance">0</span> เมตร</div>
        <div><span>📅</span> <span id="currentTime"></span></div>
      </div>

      <div class="camera-container">
        <video id="video" autoplay playsinline style="display: none;"></video>
        <div id="cameraOverlay" class="camera-overlay">
          <span>📷</span>
          <div id="cameraMessage">กดปุ่มเพื่อเปิดกล้อง</div>
          <button class="btn-camera" onclick="initCamera()">เปิดกล้อง</button>
        </div>
      </div>

      <canvas id="canvas" style="display: none;"></canvas>

      <div class="btn-group">
        <button class="btn-in" onclick="capture('IN')" id="btnIn" disabled>🟢 เข้างาน</button>
        <button class="btn-out" onclick="capture('OUT')" id="btnOut" disabled>🔴 ออกงาน</button>
      </div>

      <div id="status"></div>
    </div>

    <div class="footer">
      <p>© 2026 ระบบลงเวลาทำงานนอกสถานที่</p>
      <p style="font-size: 0.8rem;">พัฒนาโดย IT Support</p>
    </div>
  </div>
<script>
// ใช้ URL ที่ได้จากการ Deploy
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwAtE1AMawpH9RsUjGWb_CHyDN6IVHAHylZE44VL4FJFAtHAEKcnmNaqz1Kp5G2uQ3Jpg/exec'; // เปลี่ยนเป็น URL ของคุณ

// ค้นหาพนักงาน
employeeId.addEventListener('input', function() {
  const id = this.value.trim();
  if (id.length >= 3) {
    employeeName.innerText = '🔍 กำลังค้นหา...';
    
    fetch(SCRIPT_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({
        action: 'getEmployee',
        employee_id: id
      })
    })
    .then(res => res.json())
    .then(data => {
      if (data.result === 'success') {
        employeeName.innerText = `👤 ${data.name} (${data.department})`;
        employeeName.style.color = '#2d3748';
      } else {
        employeeName.innerText = '❌ ไม่พบรหัสพนักงาน';
        employeeName.style.color = '#e53e3e';
      }
    })
    .catch(err => {
      console.error(err);
      employeeName.innerText = '❌ การเชื่อมต่อผิดพลาด';
    });
  } else {
    employeeName.innerText = '';
  }
});

// ในฟังก์ชัน capture
fetch(SCRIPT_URL, {
  method: 'POST',
  headers: {
    'Content-Type': 'application/json',
  },
  body: JSON.stringify({
    action: 'saveAttendance',
    employee_id: empId,
    status: status,
    latitude: currentPosition.lat,
    longitude: currentPosition.lng,
    image: base64Data
  })
})
.then(res => res.json())
.then(data => {
  if (data.result === 'success') {
    showStatus(`✅ ${data.message}`, 'success');
    // เคลียร์ข้อมูล
    setTimeout(() => {
      employeeId.value = '';
      employeeName.innerText = '';
      currentPosition = null;
      locationInfo.style.display = 'none';
    }, 2000);
  } else {
    showStatus(`❌ ${data.message}`, 'error');
  }
})
.catch(err => {
  console.error(err);
  showStatus('❌ ไม่สามารถเชื่อมต่อ', 'error');
});
</script>
 
</body>
</html>
