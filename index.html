<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ระบบลงเวลา</title>

  <style>
    body {
      font-family: Arial;
      background: #f5f6fa;
      padding: 15px;
    }

    .card {
      background: white;
      border-radius: 18px;
      padding: 18px;
      max-width: 480px;
      margin: auto;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    h2 { text-align:center; }

    input, select {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      font-size: 16px;
      border-radius: 10px;
      border: 1px solid #ddd;
    }

    video {
      width: 100%;
      border-radius: 12px;
      margin: 10px 0;
      background: black;
    }

    button {
      width: 48%;
      padding: 12px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      color: white;
      cursor: pointer;
    }

    .btn-in { background: #273c75; }
    .btn-out { background: #c23616; }

    .btn-group {
      display: flex;
      justify-content: space-between;
      margin-top: 10px;
    }

    #status {
      text-align: center;
      margin-top: 12px;
      font-weight: bold;
    }

       footer {
      text-align: center;
      padding: 30px;
      color: var(--gray-color);
      font-size: 0.9rem;
      border-top: 1px solid #eee;
      background-color: rgba(248, 249, 250, 0.8);
    }
    
    footer p {
      margin-bottom: 8px;
    }
    
    .footer-links {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 15px;
    }
    
    .footer-links a {
      color: var(--primary-color);
      text-decoration: none;
      font-weight: 500;
      transition: var(--transition);
    }
    
    .footer-links a:hover {
      color: var(--secondary-color);
      text-decoration: underline;
    }
  </style>
</head>

<body>
  <div class="card">
    <h2>📸 ระบบลงเวลา</h2>

    <input id="empId" placeholder="รหัสพนักงาน">
    <input id="empName" placeholder="ชื่อพนักงาน">

    <select id="cameraSelect">
      <option value="user">📸 กล้องหน้า</option>
      <option value="environment">📸 กล้องหลัง</option>
    </select>

    <video id="video" autoplay playsinline></video>
    <canvas id="canvas" style="display:none;"></canvas>

    <div class="btn-group">
      <button class="btn-in" onclick="capture('IN')">🟢 เข้างาน</button>
      <button class="btn-out" onclick="capture('OUT')">🔴 ออกงาน</button>
    </div>

    <div id="status"></div>
  </div>

    <footer>
      <p>ลงเวลานอกสถานที่  © 2026 | พัฒนาโดย Sarawut.C</p>
      <p>สำหรับใช้ภายในองค์กรเท่านั้น</p>
    </footer>

<script>
/* ====== CONFIG ====== */

const YOUR_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbxCC-kieyXgoSGYKxnhJY2bgsrbvbxfM3KB1SPPSCf9jLeOGL7lurHwKAAzy-iv3iZrCA/exec";

const OFFICE_LAT = 14.57736759075333;
const OFFICE_LNG = 100.79379214129247;
const ALLOW_RADIUS = 100; // เมตร

/* ====== ELEMENTS ====== */

let stream;
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const statusDiv = document.getElementById("status");

/* ====== CAMERA ====== */

async function initCamera() {
  if (stream) {
    stream.getTracks().forEach(track => track.stop());
  }

  const facingMode = document.getElementById("cameraSelect").value;

  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode }
    });
    video.srcObject = stream;
  } catch (err) {
    alert("❌ เปิดกล้องไม่ได้: " + err.message);
  }
}

document.getElementById("cameraSelect")
  .addEventListener("change", initCamera);

/* ====== DISTANCE ====== */

function getDistance(lat1, lng1, lat2, lng2) {
  const R = 6371e3;
  const p1 = lat1 * Math.PI / 180;
  const p2 = lat2 * Math.PI / 180;
  const dp = (lat2 - lat1) * Math.PI / 180;
  const dl = (lng2 - lng1) * Math.PI / 180;

  const a = Math.sin(dp/2) ** 2 +
            Math.cos(p1) * Math.cos(p2) *
            Math.sin(dl/2) ** 2;

  return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
}

/* ====== CAPTURE ====== */

function capture(type) {

  const empId = document.getElementById("empId").value.trim();
  const empName = document.getElementById("empName").value.trim();
  const cameraMode = document.getElementById("cameraSelect").value;

  if (!empId || !empName) {
    alert("กรอกข้อมูลพนักงาน");
    return;
  }

  statusDiv.innerText = "📡 กำลังตรวจสอบ GPS...";
  statusDiv.style.color = "black";

  navigator.geolocation.getCurrentPosition(pos => {

    const lat = pos.coords.latitude;
    const lng = pos.coords.longitude;

    const distance = getDistance(lat, lng, OFFICE_LAT, OFFICE_LNG);

    if (distance > ALLOW_RADIUS) {
      statusDiv.innerText = "❌ อยู่นอกพื้นที่ (" + distance.toFixed(1) + " m)";
      statusDiv.style.color = "red";
      return;
    }

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    canvas.getContext("2d").drawImage(video, 0, 0);

    const base64 = canvas.toDataURL("image/jpeg", 0.8).split(',')[1];

    statusDiv.innerText = "⏳ กำลังบันทึก...";

    fetch(YOUR_WEBAPP_URL, {
      method: "POST",
      body: JSON.stringify({
        employee_id: empId,
        name: empName,
        type: type,
        camera: cameraMode === "user" ? "FRONT" : "BACK",
        latitude: lat,
        longitude: lng,
        distance: distance.toFixed(2),
        image: base64
      })
    })
    .then(r => r.json())
    .then(res => {
      statusDiv.innerText = "✅ บันทึกสำเร็จ";
      statusDiv.style.color = "green";
    })
    .catch(err => {
      statusDiv.innerText = "❌ บันทึกไม่สำเร็จ";
      statusDiv.style.color = "red";
    });

  }, () => {
    statusDiv.innerText = "❌ ระบุตำแหน่งไม่ได้";
    statusDiv.style.color = "red";
  }, { enableHighAccuracy: true });
}

/* ====== START ====== */

initCamera();
</script>
</body>
</html>
